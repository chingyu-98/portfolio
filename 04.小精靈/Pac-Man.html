<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>
    <link rel="stylesheet" href="./Pac-Man.css">
</head>
<body>
    <div class="big-box">
        <div class="pacman">
            <div class="eye"></div>
        </div>
        
        <div class="ghost">
            <div class="ghost-eye eye1">
                <div class="eye-black"></div>
            </div>
            <div class="ghost-eye eye2">
                <div class="eye-black"></div>
            </div>
        </div>

        <div class="dot-group dot-top">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
            <div class="dot dot-4"></div>
            
            
        </div>

        <div class="dot-group dot-right">
            <div class="dot dot-5"></div>
            <div class="dot dot-6"></div>
            <div class="dot dot-7"></div>
           
           
        </div>

        <div class="dot-group dot-btm">
             <div class="dot dot-8"></div>
            <div class="dot dot-9"></div>
            <div class="dot dot-10"></div>
            <div class="dot dot-11"></div>
            
        </div>

        <div class="dot-group dot-left">
            <div class="dot dot-12"></div>
            <div class="dot dot-13"></div>
            <div class="dot dot-14"></div>
        </div>

        <div class="box box-1"></div>
    </div>
</body>

</html>
